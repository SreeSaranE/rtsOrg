<div class="content">

    <p id="header">Join Us</p>

    <app-input-field class="inputField"
        cls="email"
        label="Email"
        placeholder="Enter email"
        [(value)]="email">
    </app-input-field>

    <app-button class="signupButton"
        cls="signup"
        label="Sign Up"
        (clicked)="signup()">
    </app-button>

    <p id="signin">Already have an Account?
        <span (click)="signIn()">Sign In</span>
    </p>

</div>
