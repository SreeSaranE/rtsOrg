<div class="main-content">

    <div class="head">
        <p>Manage Users</p>

        <app-button
            class="refreshBtn"
            label="Refresh Data"
            maxWidth="150px"
            minWidth="150px"
            (clicked)="userStore.refresh()">
        </app-button>

    </div>

    <app-data-table
        [data]="userStore.users()"
        [columns]="columns"
        [showDelete]="true"
        [showStatus]="true"
        (delete)="delete($event)"
        (statusChange)="updateStatus($event)"
        
        ></app-data-table>

    <app-confirmation-dialog
        [isOpen]="showDeleteDialog"
        [title]="'Delete' + selectedUser?.name"
        [message]="'You are going to delete user ' + selectedUser?.name"
        confirmText="Delete"
        cancelText="Cancel"
        (confirmed)="confirmDelete()"
        (cancelled)="cancelDelete()">
    </app-confirmation-dialog>

</div>
