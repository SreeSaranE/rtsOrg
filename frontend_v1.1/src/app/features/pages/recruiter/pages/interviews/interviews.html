<div class="main-content">

    <div class="head">
        <p>Manage Interview</p>
        
        <div class="btn">

            <app-button
                class="refreshBtn"
                label="Refresh Data"
                maxWidth="150px"
                minWidth="150px"
                (clicked)="interviewStore.refresh()">
            </app-button>

        </div>
    
    </div>

    <app-data-table
        [data]="interviewStore.interviews()"
        [columns]="columns"
        [showDelete]="true"
        [showStatus]="true"
        (delete)="delete($event)"
       
    ></app-data-table>

    <app-confirmation-dialog
        [isOpen]="showDeleteDialog"
        [title]="'Delete ' + selectedInterview?.jobApplicationId"
        [message]="'You are about to delete ' + selectedInterview?.jobApplicationId"
        confirmText="Delete"
        cancelText="Cancel"
        (confirmed)="confirmDelete()"
        (cancelled)="cancelDelete()">
    </app-confirmation-dialog>
</div>
