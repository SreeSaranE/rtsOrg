<div class="main-content">

    <div class="head">
        <p>Manage Candidates</p>

        <app-button
            class="refreshBtn"
            label="Refresh Data"
            maxWidth="150px"
            minWidth="150px"
            (clicked)="applicationStore.refresh()">
        </app-button>
    </div>

    <app-data-table
        [data]="applicationStore.applications()"
        [columns]="columns"
        [showDelete]="true"
        (delete)="delete($event)">
    </app-data-table>

    <app-confirmation-dialog
        [isOpen]="showDeleteDialog"
        [title]="'Delete ' + selectedApplication?.jobApplicationId"
        [message]="'You are about to delete ' + selectedApplication?.jobApplicationId"
        confirmText="Delete"
        cancelText="Cancel"
        (confirmed)="confirmDelete()"
        (cancelled)="cancelDelete()">
    </app-confirmation-dialog>

</div>
