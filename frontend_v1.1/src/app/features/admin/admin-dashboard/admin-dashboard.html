<app-sidebar
    title="Admin"
    [naviList]="navList"
></app-sidebar>

<div class="main-content">
<app-button
    class="refreshBtn"
    label="Refresh Data"
    maxWidth="150px"
    minWidth="150px"
    (clicked)="getDetail()">
</app-button>

<table class="userTable">
    <thead>
        <tr>
            <th>NAME</th>
            <th>EMAIL</th>
            <th>ROLE</th>
            <th>STATUS</th>
            <!-- <th>CREATED AT</th> -->
        </tr>
    </thead>

    <tbody>
        @for (user of pagedUsers; track user.userId) {
            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.role }}</td>

                <td>
                    <select
                        [value]="user.isActive ? 'true' : 'false'"
                        (change)="updateStatus(user, $event)">
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </td>

                <!-- <td>{{ user.createdAt | date:'dd/MM/yyyy' }}</td> -->
            </tr>
        }
    </tbody>
</table>

<div class="pagination">
    <button
        (click)="previousPage()"
        [disabled]="currentPage === 1">
        <
    </button>

    <span id="page">
        {{ currentPage }} of {{ totalPages }}
    </span>

    <button
        (click)="nextPage()"
        [disabled]="currentPage === totalPages">
        >
    </button>
</div>

</div>
