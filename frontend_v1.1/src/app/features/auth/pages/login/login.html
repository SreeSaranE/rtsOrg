<div class="content">

    <p id="header">Welcome Back</p>

    <app-input-field
        class="inputField"
        [showValid] = showValid
        label="Email"
        placeholder="Enter Email"
        type="email"
        [(value)]="email"
        (validChange)="emailValid = $event">
    </app-input-field>

    <app-input-field
        class="inputField"
        label="Password"
        placeholder="Enter Password"
        type="password"
        [(value)]="password">
    </app-input-field>

    @if (!showValid) {
        <p class="error">{{ contextText }}</p>
    }

    <p id="forgetPass">Forgot your password?</p>

    <app-button
        class="loginButton"
        label="Login"
        (clicked)="login()">
    </app-button>

    <p id="register">
        Don't have an account?
        <span (click)="register()">Register</span>
    </p>

</div>
